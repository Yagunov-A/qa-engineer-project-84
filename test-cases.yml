- summary: | # 9 Успешное добавление товаров в корзину
    Успешное добавление товаров в корзину
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину и просматривать содержимое корзины
  prerequisites: |
    Список товаров состоит не менее чем из 3 страниц
    Список товаров отображается с первой страницы
    Фильтр по наличию на складе в исходном состоянии ("В наличии")
    В списке товаров есть товары, которые есть в наличии на складе с количеством больше 2
    В корзине нет добавленных товаров
  test-data: |
    Нет данных
  steps:
    - У первого товара с количеством на складе больше 2 кликнуть кнопку "Добавить в корзину"
    - Убедиться, что счётчик добавленных в корзину товаров увеличился на 1
    - Для этого же товара повторно кликнуть кнопку "Добавить в корзину"
    - Убедиться, что счётчик добавленных в корзину товаров увеличился на 1
    - Для этого же товара перейти в карточку товара
    - В карточке товара кликнуть кнопку "Добавить в корзину"
    - Убедиться, что счётчик добавленных в корзину товаров увеличился на 1
    - Перейти на последнюю страницу списка товаров
    - У любого товара на странице кликнуть кнопку "Добавить в корзину"
    - Убедиться, что счётчик добавленных в корзину товаров увеличился на 1
  expected-result: |
    Значение счётчика добавленных в корзину товаров увеличивается на 1 при каждом добавлении товара в корзину
    из списка товаров и из карточки товара

