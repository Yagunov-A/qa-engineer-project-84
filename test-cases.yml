    - Убедиться, что на странице отображается список товаров с изображением, наименованием и ценой
    - Повторить шаги перехода на предыдущую страницу и проверки отображения списка товаров
      до достижения первой страницы списка товаров
  expected-result: |
    На каждой странице списка товаров отображются кнопки навигации, а также список товаров с изображением, наименованием и ценой
    На каждой странице списка товаров выполняется переход между страницами списка в обе стороны

