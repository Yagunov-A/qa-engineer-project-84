    - Убедиться, что поиск по ключевому слову в каждом случае работает одинаково
  expected-result: |
    В результатах поиска отображаются все товары из исходного списка, в наименовании которых встречается ключевое слово
    На разных страницах списка товаров поиск по ключевому слову работает одинаково
    После очистки поля Search отображается исходный список товаров

