    Нет данных
  steps:
    - Убедиться, что на первой странице отображается список товаров с изображением, наименованием и ценой 
    - Кликнуть на кнопке "Next" (Следующая) для перехода на следующую страницу списка товаров
    - Убедиться, что на странице отображается список товаров с изображением, наименованием и ценой
    - Повторить шаги перехода на следующую страницу и проверки отображения списка товаров
      до достижения последней страницы списка товаров
