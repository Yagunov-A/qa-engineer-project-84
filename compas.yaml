---
технический язык: |
  - точность и однообразие формулировок
  - лаконичность
1 баланс между: |
  - специфичностью
  - общностью
2 баланс между: |
  - простотой
  - сложностью
показательность: |
  - атомарность тестов
  - требования должны быть измеримыми и проверяемыми
  - высокая вероятность обнаружения ошибок
последовательность: |
  - все шаги ведут к достижению одной цели
  - отсутствуют избыточные действия
демонстративность: |
  - ожидаемые результаты должны однозначно и очевидно 
  показывать отклонения от нормы
прослеживаемость: |
  - однозначное понимание какая часть тестируется
  - однозначное понимание тестируемого требования
повторяемость: |
  - тесты должны быть воспроизводимы в любых условиях
  - тесты должны давать одинаковый результат при повторном выполнении


